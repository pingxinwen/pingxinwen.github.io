<!doctype html><html lang="zh-CN"><head><title>平信文的小站</title><meta name="viewport" content="minimum-scale=1,initial-scale=1,width=device-width"/><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet"><script>// Single Page Apps for GitHub Pages
    // MIT License
    // https://github.com/rafgraph/spa-github-pages
    // This script checks to see if a redirect is present in the query string,
    // converts it back into the correct url and adds it to the
    // browser's history using window.history.replaceState(...),
    // which won't cause the browser to attempt to load the new url.
    // When the single page app is loaded further down in this file,
    // the correct url will be waiting in the browser's history for
    // the single page app to route accordingly.
    (function(l) {
      if (l.search[1] === '/' ) {
        var decoded = l.search.slice(1).split('&').map(function(s) { 
          return s.replace(/~and~/g, '&')
        }).join('?');
        window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location))</script><script defer="defer" src="https://blog.pingxinwen.top/runtime-70b7b1bd.js"></script><script defer="defer" src="https://blog.pingxinwen.top/791-33967616.js"></script><script defer="defer" src="https://blog.pingxinwen.top/main-ea117a11.js"></script></head><body><div class="image-background"></div><div id="root"></div></body></html>
